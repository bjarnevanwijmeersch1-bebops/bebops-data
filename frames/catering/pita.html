<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catering - Bebops Zottegem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-color: #c41e3a;
        --secondary-color: #ffffff;
        --accent-color: #1a1a1a;
        --text-light: #ffffff;
        --price-color: #2d5a27;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Open Sans", sans-serif;
        background: linear-gradient(135deg, #ffffff 0%, #f7fafc 100%);
      }

      .header-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100px;
        background: linear-gradient(
          135deg,
          var(--primary-color) 0%,
          #8b0000 100%
        );
        display: flex;
        align-items: center;
        padding: 0 50px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        z-index: 1000;
      }

      .header-overlay::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: var(--secondary-color);
      }

      .logo-container {
        display: flex;
        align-items: center;
        gap: 25px;
      }

      .club-logo {
        height: 70px;
        width: auto;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
      }

      .club-text {
        display: flex;
        flex-direction: column;
      }

      .club-name {
        font-family: "Bebas Neue", sans-serif;
        font-size: 3rem;
        color: var(--text-light);
        letter-spacing: 3px;
        line-height: 1;
      }

      .club-subtitle {
        font-family: "Open Sans", sans-serif;
        font-size: 1.1rem;
        color: var(--secondary-color);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 5px;
        opacity: 0.9;
      }

      .frame {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 140px 60px 60px 60px;
      }

      .catering-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.5rem;
        color: var(--primary-color);
        text-transform: uppercase;
        letter-spacing: 4px;
        margin-bottom: 50px;
      }

      .menu-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .item-icon {
        font-size: 8rem;
        margin-bottom: 30px;
      }

      .item-name {
        font-family: "Bebas Neue", sans-serif;
        font-size: 5rem;
        color: var(--accent-color);
        text-transform: uppercase;
        letter-spacing: 4px;
        margin-bottom: 20px;
      }

      .item-description {
        font-family: "Open Sans", sans-serif;
        font-size: 1.5rem;
        color: #666;
        margin-bottom: 30px;
        max-width: 600px;
      }

      .item-price {
        font-family: "Bebas Neue", sans-serif;
        font-size: 4rem;
        color: var(--price-color);
        letter-spacing: 2px;
      }

      .item-price::before {
        content: "€";
        font-size: 3rem;
        margin-right: 5px;
      }
    </style>
  </head>
  <body>
    <div class="header-overlay">
      <div class="logo-container">
        <img
          src="https://bjarnevanwijmeersch1-bebops.github.io/bebops-data/images/logo.png"
          alt="Bebops"
          class="club-logo"
        />
        <div class="club-text">
          <span class="club-name">Bebops</span>
          <span class="club-subtitle">Baseball- & Softballclub</span>
        </div>
      </div>
    </div>

    <div class="frame">
      <div class="catering-title">Vandaag in de kantine</div>

      <div class="menu-item">
        <div class="item-icon">🥙</div>
        <div class="item-name">Pita</div>
        <div class="item-price">5.00</div>
      </div>
    </div>
  </body>
</html>
