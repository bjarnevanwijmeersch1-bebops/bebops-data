<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sponsors - Bebops Zottegem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-color: #c41e3a;
        --secondary-color: #ffffff;
        --accent-color: #1a1a1a;
        --text-light: #ffffff;
        --slide-duration: 8s;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Open Sans", sans-serif;
      }

      .header-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100px;
        background: linear-gradient(135deg, var(--primary-color) 0%, #8b0000 100%);
        display: flex;
        align-items: center;
        padding: 0 50px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        z-index: 1000;
      }

      .header-overlay::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: var(--secondary-color);
      }

      .logo-container {
        display: flex;
        align-items: center;
        gap: 25px;
      }

      .club-logo {
        height: 70px;
        width: auto;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
      }

      .club-text {
        display: flex;
        flex-direction: column;
      }

      .club-name {
        font-family: "Bebas Neue", sans-serif;
        font-size: 3rem;
        color: var(--text-light);
        letter-spacing: 3px;
        line-height: 1;
      }

      .club-subtitle {
        font-family: "Open Sans", sans-serif;
        font-size: 1.1rem;
        color: var(--secondary-color);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 5px;
        opacity: 0.9;
      }

      .frame {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 140px 60px 80px 60px;
        background: linear-gradient(135deg, #ffffff 0%, #f7fafc 100%);
      }

      .section-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.5rem;
        color: var(--primary-color);
        text-transform: uppercase;
        letter-spacing: 4px;
        margin-bottom: 40px;
      }

      .sponsor-container {
        display: flex;
        justify-content: center;
        align-items: center;
        flex: 1;
        width: 100%;
        max-width: 80%;
        position: relative;
      }

      .sponsor-slide {
        position: absolute;
        opacity: 0;
        transition: opacity 0.8s ease-in-out;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
      }

      .sponsor-slide.active {
        opacity: 1;
      }

      .sponsor-image {
        max-width: 100%;
        max-height: 55vh;
        object-fit: contain;
        filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.1));
      }

      /* Progress bar */
      .progress-container {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 6px;
        background: rgba(0, 0, 0, 0.1);
        z-index: 1000;
      }

      .progress-bar {
        height: 100%;
        background: var(--primary-color);
        width: 0%;
        animation: progress var(--slide-duration) linear infinite;
      }

      @keyframes progress {
        from { width: 0%; }
        to { width: 100%; }
      }

      /* Slide counter */
      .slide-counter {
        position: fixed;
        bottom: 20px;
        right: 30px;
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.2rem;
        color: var(--accent-color);
        opacity: 0.5;
      }
    </style>
  </head>

        <div class="club-text">

      </div>

/AP8ANR//2Q==" }
      ];

      let currentIndex = 0;
      const container = document.getElementById('sponsorContainer');
      const counter = document.getElementById('slideCounter');
      const progressBar = document.getElementById('progressBar');
      const slideDuration = 8 * 1000;

      // Create slides
      sponsors.forEach((sponsor, index) => {
        const slide = document.createElement('div');
        slide.className = 'sponsor-slide' + (index === 0 ? ' active' : '');
        slide.innerHTML = `<img src="${sponsor.image}" alt="${sponsor.name}" class="sponsor-image">`;
        container.appendChild(slide);
      });

      function updateCounter() {
        counter.textContent = `${currentIndex + 1} / ${sponsors.length}`;
      }

      function nextSlide() {
        const slides = document.querySelectorAll('.sponsor-slide');
        slides[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % sponsors.length;
        slides[currentIndex].classList.add('active');
        updateCounter();

        // Reset progress bar animation
        progressBar.style.animation = 'none';
        progressBar.offsetHeight; // Trigger reflow
        progressBar.style.animation = `progress ${slideDuration/1000}s linear infinite`;
      }

      updateCounter();
      setInterval(nextSlide, slideDuration);
    </script>
