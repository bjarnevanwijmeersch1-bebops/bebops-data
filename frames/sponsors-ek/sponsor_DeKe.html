        display: flex;
        align-items: center;
        gap: 25px;
      }

      .club-logo {
        height: 70px;
        width: auto;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
      }

      .club-text {
        display: flex;
        flex-direction: column;
      }

      .club-name {
        font-family: "Bebas Neue", sans-serif;
        font-size: 3rem;
        color: var(--text-light);
        letter-spacing: 3px;
        line-height: 1;
      }

      .club-subtitle {
        font-family: "Open Sans", sans-serif;
        font-size: 1.1rem;
        color: var(--secondary-color);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 5px;
        opacity: 0.9;
      }

      .frame {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 140px 60px 60px 60px;
      }

      .section-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.5rem;
        color: var(--primary-color);
        text-transform: uppercase;
        letter-spacing: 4px;
        margin-bottom: 40px;
      }

      .sponsor-container {
        display: flex;
        justify-content: center;
        align-items: center;
        flex: 1;
        width: 100%;
        max-width: 80%;
      }

      .sponsor-image {
        max-width: 100%;
        max-height: 55vh;
        object-fit: contain;
        filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.1));
        opacity: 0;
        transition: opacity 0.4s ease-in;
      }

      .sponsor-image.loaded {
        opacity: 1;
      }
    </style>
  </head>
