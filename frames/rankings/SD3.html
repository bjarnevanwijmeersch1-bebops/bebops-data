<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Softball Ladies D3 Rankings - Bebops Zottegem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-color: #c41e3a;
        --secondary-color: #ffffff;
        --accent-color: #1a1a1a;
        --text-light: #ffffff;
        --text-dark: #333;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Open Sans", sans-serif;
        background: linear-gradient(135deg, #ffffff 0%, #f7fafc 100%);
      }

      .header-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100px;
        background: linear-gradient(
          135deg,
          var(--primary-color) 0%,
          #8b0000 100%
        );
        display: flex;
        align-items: center;
        padding: 0 50px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        z-index: 1000;
      }

      .header-overlay::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: var(--secondary-color);
      }

      .logo-container {
        display: flex;
        align-items: center;
        gap: 25px;
      }

      .club-logo {
        height: 70px;
        width: auto;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
      }

      .club-text {
        display: flex;
        flex-direction: column;
      }

      .club-name {
        font-family: "Bebas Neue", sans-serif;
        font-size: 3rem;
        color: var(--text-light);
        letter-spacing: 3px;
        line-height: 1;
      }

      .club-subtitle {
        font-family: "Open Sans", sans-serif;
        font-size: 1.1rem;
        color: var(--secondary-color);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 5px;
        opacity: 0.9;
      }

      .content {
        width: 100%;
        height: 100%;
        padding: 120px 60px 60px 60px;
        overflow-y: auto;
      }

      .rankings-container {
        max-width: 1400px;
        margin: 0 auto;
      }

      .division-section {
        margin-bottom: 60px;
      }

      .division-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.5rem;
        color: var(--primary-color);
        text-transform: uppercase;
        letter-spacing: 4px;
        margin-bottom: 30px;
        text-align: center;
      }

      .rankings-table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      }

      .rankings-table thead {
        background: linear-gradient(
          135deg,
          var(--primary-color) 0%,
          #8b0000 100%
        );
        color: var(--text-light);
      }

      .rankings-table th {
        padding: 20px 15px;
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.3rem;
        letter-spacing: 2px;
        text-align: left;
      }

      .rankings-table th.center,
      .rankings-table td.center {
        text-align: center;
      }

      .rankings-table tbody tr {
        border-bottom: 1px solid #f0f0f0;
        transition: background-color 0.2s;
      }

      .rankings-table tbody tr:hover {
        background-color: #f8f9fa;
      }

      .rankings-table tbody tr.bebops {
        background-color: #fff5f5;
        font-weight: 600;
      }

      .rankings-table tbody tr.bebops:hover {
        background-color: #ffe5e5;
      }

      .rankings-table td {
        padding: 15px;
        font-size: 1.1rem;
        color: var(--text-dark);
      }

      .team-cell {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .team-logo {
        width: 40px;
        height: 40px;
        object-fit: contain;
      }

      .team-name {
        font-weight: 500;
      }

      .rank-cell {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.5rem;
        color: var(--primary-color);
        font-weight: bold;
      }

      .stats-cell {
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="header-overlay">
      <div class="logo-container">
        <img
          src="https://bjarnevanwijmeersch1-bebops.github.io/bebops-data/images/logo.png"
          alt="Bebops"
          class="club-logo"
        />
        <div class="club-text">
          <span class="club-name">Bebops</span>
          <span class="club-subtitle">Baseball- & Softballclub</span>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="rankings-container">
        <div id="sd3-section" class="division-section">
          <div class="division-title">Softball Ladies D3</div>
          <table class="rankings-table">
            <thead>
              <tr>
                <th class="center">#</th>
                <th>Team</th>
                <th class="center">W</th>
                <th class="center">L</th>
                <th class="center">T</th>
                <th class="center">PCT</th>
                <th class="center">GB</th>
              </tr>
            </thead>
            <tbody id="sd3-tbody">
              <tr>
                <td colspan="7" class="center">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      // Auto-detect if running locally or on GitHub Pages
      const isLocal = window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
      const DATA_BASE_URL = isLocal
        ? '../../data/rankings/'
        : 'https://bjarnevanwijmeersch1-bebops.github.io/bebops-data/data/rankings/';

      function isBebopsTeam(teamName) {
        return teamName && teamName.toLowerCase().includes('bebops');
      }

      function createTeamRow(team) {
        const row = document.createElement('tr');
        if (isBebopsTeam(team['Team.1'])) {
          row.classList.add('bebops');
        }

        row.innerHTML = `
          <td class="center rank-cell">${team['#']}</td>
          <td>
            <div class="team-cell">
              ${team['Team'] ? `<img src="${team['Team']}" alt="Team Logo" class="team-logo" />` : ''}
              <span class="team-name">${team['Team.1']}</span>
            </div>
          </td>
          <td class="center stats-cell">${team['W']}</td>
          <td class="center stats-cell">${team['L']}</td>
          <td class="center stats-cell">${team['T']}</td>
          <td class="center">${team['PCT'].toFixed(3)}</td>
          <td class="center">${team['GB'] === 0 ? '-' : team['GB'].toFixed(1)}</td>
        `;

        return row;
      }

      async function loadRankings() {
        try {
          const sd3Response = await fetch(`${DATA_BASE_URL}SD3.json`);
          const sd3Data = await sd3Response.json();
          const sd3Tbody = document.getElementById('sd3-tbody');
          sd3Tbody.innerHTML = '';
          sd3Data.forEach(team => {
            sd3Tbody.appendChild(createTeamRow(team));
          });
        } catch (error) {
          console.error('Error loading rankings:', error);
          document.getElementById('sd3-tbody').innerHTML = '<tr><td colspan="7" class="center">Error loading rankings</td></tr>';
        }
      }

      loadRankings();
    </script>
  </body>
</html>
